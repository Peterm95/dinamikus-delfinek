<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinamikus Delfinek - Hamarosan!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0B132B;
            --bg-card: #1C2541;
            --accent-blue: #48CAE4;
            --text-light: #FFFFFF;
            --text-muted: #95A5A6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* Finom tengeri hangulatú háttér-effekt */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 30%, #1C2541 0%, #0B132B 70%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(28, 37, 65, 0.6);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(72, 202, 228, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .icon-container {
            font-size: 5.5rem;
            margin-bottom: 25px;
            display: inline-block;
            animation: swim 4s ease-in-out infinite;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 0 30px 0;
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            background-color: rgba(72, 202, 228, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Delfin úszó/lebegő animáció */
        @keyframes swim {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(5deg); }
            50% { transform: translateY(0px) rotate(0deg); }
            75% { transform: translateY(10px) rotate(-5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">🐬</div>
        <h1>Dinamikus Delfinek</h1>
        <p>A weboldalunk jelenleg a háttérben frissül és formálódik. Hamarosan érkezünk a legújabb tábor részleteivel és információival!</p>
        <div class="badge">Fejlesztés alatt</div>
    </div>

</body>
</html>
